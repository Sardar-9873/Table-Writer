<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Writer</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div id="table-wrapper" class="flex">
        <input id="table" type="number" placeholder="Enter desire table">
        <button id="table-next">Next</button>
    </div>

    <div id="table-count-wrapper" class="none">
        <input id="table-count" type="number" placeholder="Enter desire table count">
        <button id="table-count-next">See Result</button>
    </div>

    <div id="result-wrapper" class="none">
        <p>Table you want:<br><span id="result"></span></p>
    </div>
    <script src="./app.js"></script>
</body>

</html>
